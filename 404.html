<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Shubhum Joshi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#e8e8e8;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
h1{font-size:clamp(4rem,15vw,10rem);font-weight:200;color:rgba(255,255,255,0.06);letter-spacing:-0.05em;line-height:1}
h2{font-size:clamp(1.2rem,2vw,2rem);font-weight:300;color:#fff;margin-top:-1rem;margin-bottom:1.5rem}
p{font-size:clamp(0.85rem,1vw,1.1rem);color:#999;max-width:24em;margin-bottom:2.5rem;line-height:1.7}
a{display:inline-flex;align-items:center;gap:0.5rem;padding:0.8rem 2rem;border:1px solid rgba(255,255,255,0.15);color:#fff;text-decoration:none;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.3s,border-color 0.3s}
a:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<h1>404</h1>
<h2>Page not found</h2>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="/portfolio/">Back to home</a>
</body>
</html>
